name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore StudentExamSystem.sln

      - name: Build
        run: dotnet build StudentExamSystem.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tests/Tests.csproj --configuration Release --no-build --verbosity normal
